<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Radius Map UK</title>


  <link rel="stylesheet" href="style.css">


  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >

</head>


<body>


<div class="app">


  <div class="controls">


    <h1>📍 Radius Map UK</h1>


    <div class="search-row">


      <input
        id="postcode"
        type="text"
        placeholder="Enter UK postcode"
      >


      <button onclick="searchPostcode()">
        Search
      </button>


    </div>



    <div class="options">


      <button onclick="setRadius(100, this)">
        100m
      </button>


      <button onclick="setRadius(300, this)" class="active">
        300m
      </button>


      <button onclick="setRadius(500, this)">
        500m
      </button>


      <button onclick="setRadius(1000, this)">
        1km
      </button>


      <button class="location-btn" onclick="findLocation()">
        📍 My Location
      </button>


    </div>


  </div>



  <div id="map"></div>


</div>




<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


<script src="app.js"></script>



<script>

if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register("service-worker.js");

}

</script>


</body>

</html>
